<!DOCTYPE html>
<html>
<body>
    <div id="container" style="display: flex; flex-wrap: wrap;"></div>
    <script>
        async function load() {
            const mapRes = await fetch('/assets/sc/knight_mapping.json');
            const mapping = await mapRes.json();
            const partRes = await fetch('/assets/sc/shape_parts.json');
            const shapeParts = await partRes.json();

            const container = document.getElementById('container');
            for(let i=1; i<=9; i++) {
                const key = 'Knight_run1_' + i;
                const anim = mapping[key];
                if(!anim) continue;
                const shapeIds = anim.shapes[0];
                const div = document.createElement('div');
                div.style.width = '100px'; div.style.height = '100px';
                div.style.position = 'relative'; div.style.border = '1px solid black';
                div.innerHTML = '<span>' + i + '</span>';
                
                let ids = Array.isArray(shapeIds) ? shapeIds : [shapeIds];
                for(let id of ids) {
                    if (id === -1) continue;
                    let parts = (shapeParts['chr_knight_tex'] && shapeParts['chr_knight_tex'][id]) || 1;
                    for(let p=0; p<parts; p++) {
                        let img = document.createElement('img');
                        img.src = '/assets/sc/chr_knight_tex/' + id + '_' + p + '.png';
                        img.style.position = 'absolute';
                        img.style.bottom = '10px';
                        img.style.left = '50%';
                        img.style.transform = 'translate(-50%, 0) scale(0.5)';
                        div.appendChild(img);
                    }
                }
                container.appendChild(div);
            }
        }
        load();
    </script>
</body>
</html>
